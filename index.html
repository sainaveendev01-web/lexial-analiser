<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>sai_naveen | Compiler Lab</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --insta-blue: #0095f6;
            --insta-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --text: #fafafa;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            width: 100%;
            max-width: 350px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
        }
        .story-ring {
            width: 100px;
            height: 100px;
            background: var(--insta-grad);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }
        .profile-pic {
            background: var(--bg);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }
        h1 { font-size: 22px; margin: 5px 0; }
        .reg { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; font-family: monospace; }
        .btn-link {
            background: var(--insta-blue);
            color: white;
            text-decoration: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            display: block;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn-link:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="story-ring"><div class="profile-pic">SN</div></div>
        <h1>sai_naveen</h1>
        <div class="reg">RA2311003050059</div>
        <p style="font-size: 14px; color: #dbdbdb;">Lexical Analyzer Simulation<br>Phase 1: Tokenization</p>
        <a href="simulation.html" class="btn-link">Open Lexer</a>
    </div>
</body>
</html>
