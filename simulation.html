<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lexer Feed | Sai Naveen</title>
    <style>
        :root {
            --bg: #000;
            --card: #121212;
            --border: #262626;
            --blue: #0095f6;
            --text: #fff;
            --kw: #bc1888; /* Keyword Pink */
            --id: #0095f6; /* Identifier Blue */
            --op: #f09433; /* Operator Orange */
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .nav { border-bottom: 1px solid var(--border); padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .container { max-width: 935px; margin: 20px auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .editor-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        .header { padding: 14px; display: flex; align-items: center; border-bottom: 1px solid var(--border); font-weight: 600; }
        .circle { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #bc1888); margin-right: 12px; }
        textarea { width: 100%; height: 350px; background: #000; color: #efefef; border: none; padding: 20px; font-family: 'JetBrains Mono', monospace; outline: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; }
        .footer-action { padding: 12px; border-top: 1px solid var(--border); }
        .btn { background: var(--blue); color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .sidebar-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .token-item { display: inline-block; padding: 4px 8px; margin: 2px; border-radius: 4px; font-size: 11px; background: #1a1a1a; font-family: monospace; }
        .label { color: #8e8e8e; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="nav">CompilerGram</div>
    <div class="container">
        <div class="editor-section">
            <div class="header"><div class="circle"></div>sai_naveen</div>
            <textarea id="code" spellcheck="false">int main() {
    int x = 10 + 20;
    printf("Result: %d", x);
    return 0;
}</textarea>
            <div class="footer-action"><button class="btn" onclick="analyze()">Analyze Tokens</button></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-box">
                <span class="label">Token Stream</span>
                <div id="token-stream" style="line-height: 2;">Ready to tokenize...</div>
            </div>
            <div class="sidebar-box">
                <span class="label">User Details</span>
                <p style="font-size: 14px; margin: 5px 0;"><strong>Name:</strong> Sai Naveen</p>
                <p style="font-size: 14px; margin: 5px 0;"><strong>Reg:</strong> RA2311003050059</p>
            </div>
        </div>
    </div>

    <script>
        function analyze() {
            const code = document.getElementById('code').value;
            const keywords = ['int', 'return', 'if', 'else', 'while', 'for', 'void', 'printf'];
            const operators = ['+', '-', '*', '/', '=', '==', '<', '>', '(', ')', '{', '}', ';', ','];
            
            // Basic regex to split code into words and symbols
            const rawTokens = code.match(/[a-zA-Z_]\w*|\d+|"([^"\\]|\\.)*"|[+*=\-\/<>!&|]+|[(){};,]/g) || [];
            let html = "";

            rawTokens.forEach(t => {
                let color = "white";
                if (keywords.includes(t)) color = "var(--kw)";
                else if (operators.includes(t)) color = "var(--op)";
                else if (t.startsWith('"')) color = "#69db7c"; // String Green
                else if (!isNaN(t)) color = "#ffd43b"; // Number Yellow
                else color = "var(--id)";

                html += `<span class="token-item" style="border-left: 2px solid ${color}">${t}</span> `;
            });

            document.getElementById('token-stream').innerHTML = html;
        }
    </script>
</body>
</html>
